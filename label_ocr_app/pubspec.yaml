name: label_ocr_app
description: "Label OCR Mapper - Photograph product labels and extract structured data using OCR."
publish_to: "none"
version: 1.0.0+1

environment:
    sdk: ^3.12.2

dependencies:
    flutter:
        sdk: flutter
    cupertino_icons: ^1.0.8
    go_router: ^14.0.0
    google_mlkit_text_recognition: ^0.13.0
    camera: ^0.10.5+2
    image_picker: ^1.1.0
    path_provider: ^2.1.1
    sqflite: ^2.3.0
    path: ^1.8.3
    google_fonts: ^6.1.0

dev_dependencies:
    flutter_test:
        sdk: flutter
    flutter_lints: ^6.0.0

flutter:
    uses-material-design: true

    assets:
        - captures/

fonts:
    - family: DM Sans
      fonts:
          - asset: packages/google_fonts/assets/DMSans-Regular.ttf
    - family: JetBrains Mono
      fonts:
          - asset: packages/google_fonts/assets/JetBrainsMono-Regular.ttf
